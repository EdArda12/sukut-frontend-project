<!doctype html>
<html lang="tr">

<head>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Source+Serif+4:opsz,wght@8..60,400;8..60,600;8..60,700&family=Inter:wght@400;500;600&display=swap"
        rel="stylesheet">

    <link rel="stylesheet" href="style.css" />
    <link rel="stylesheet" href="overrides.css" />

</head>

<body>


    <div class="page">
        <div class="frame">

            <!-- TOP NAV -->
            <header class="topbar">
                <a class="brand" href="index.html" aria-label="Sükût ana sayfa">
                    <img class="brand-logo" src="images/koyulogo.png" alt="Sükût Logo" />
                    <span class="brand-text">Sükût</span>
                </a>

                <nav class="nav" aria-label="Ana menu">
                    <a class="nav__link is-active" href="index.html">Ana Sayfa</a>
                    <a class="nav__link" href="hakkimizda.html">Hakkımızda</a>

                    <a class="nav__link" href="iletisim.html">İletişim</a>
                </nav>

                <a class="btn btn--pill" href="giris.html">Oturum Aç</a>
            </header>

            <!-- HERO -->
            <main class="hero">
                <div class="hero__inner">

                    <!-- MOR ALAN: BUYUK SUKÛT + ANA LOGO -->
                    <div class="hero-brand" aria-label="Sükût ana marka alani">
                        <h1 class="hero-title">Sükût</h1>
                        <img class="hero-mark" src="images/analogo.png" alt="Sükût Ana Logo" />
                    </div>

                    <form class="search" role="search" aria-label="Sayfada ara" autocomplete="off">
                        <span class="search__icon" aria-hidden="true">
                            <svg width="22" height="22" viewBox="0 0 24 24" fill="none">
                                <path d="M10.5 18.5a8 8 0 1 1 0-16 8 8 0 0 1 0 16Z" stroke="currentColor"
                                    stroke-width="2" />
                                <path d="M16.6 16.6 21 21" stroke="currentColor" stroke-width="2"
                                    stroke-linecap="round" />
                            </svg>
                        </span>

                        <input id="pageSearch" class="search__input" type="search" placeholder="Sayfada Ara."
                            aria-label="Sayfada ara" />
                    </form>

                    <!--  EKSTRA EKLEME YAPILDI -->

                    <p class="hero-slogan">
                        Sessizlik bir lüks değil, bir ihtiyaç.
                    </p>

                    <div class="hero-values">
                        <div class="value-item">
                            🌿 <span>%100 Doğal İçerik</span>
                        </div>
                        <div class="value-item">
                            🌙 <span>Uyku & Zihin Odaklı</span>
                        </div>
                        <div class="value-item">
                            🕯️ <span>Minimal & Zamansız Tasarım</span>
                        </div>
                    </div>

                </div>
            </main>


            <!-- FOOTER BAR -->
            <footer class="bottombar">
                <div class="social" aria-label="Sosyal bağlantılar">
                    <a class="social__btn" href="#" aria-label="Facebook">
                        <img src="images/facebook.png" alt="" />
                    </a>

                    <a class="social__btn" href="#" aria-label="YouTube">
                        <img src="images/youtube.png" alt="" />
                    </a>

                    <a class="social__btn" href="#" aria-label="Instagram">
                        <img src="images/instagram.png" alt="" />
                    </a>

                    <a class="social__btn" href="#" aria-label="X">
                        <img src="images/x.png" alt="" />
                    </a>

                <div class="credit">
                    Coded by Arda PEHLIVAN
